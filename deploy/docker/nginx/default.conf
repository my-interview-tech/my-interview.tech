# Соответствует логике quartz serve (handlers.js): сначала файл, index в каталоге, затем .html у «красивого» URL.
# Без $uri.html запросы без расширения падали в /index.html → SPA получал главную и ломал относительные ссылки.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|webp|map)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
